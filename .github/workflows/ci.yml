on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            # Install npm dependencies
            - name: Install dependencies
              run: npm install
            - name: Build
              run: npm run build
            # Create a artifact from the dist/ folder
            - name: Archive production artifact
              uses: actions/upload-artifact@v4
              with:
                  path: dist 
                  name: dist
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
            # Deploy the artifact to the server
            - name: Deploy
              run: |
                    scp -r dist/* -i '${{ secrets.NEON_PRIVATE_KEY }}' ${{ secrets.NEON_SSH_USER }}@${{ secrets.NEON_SSH_HOST }}:/var/www/www.taxborn.com