name: Build
on:
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22, 23]
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                node-version: ${{ matrix.node-version }}
                cache: 'npm'
            - run: npm install
            - run: npm run build