name: Deploy
on:
    workflow_dispatch:
    push:
        branches:
            - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - uses: actions/setup-node@v4
              with:
                node-version: 23
                cache: 'npm'
            - run: npm install
            - run: npm run build
            - name: Upload compiled Astro site
              uses: actions/upload-artifact@v4
              with:
                  path: dist 
                  name: dist
    deploy:
        runs-on: ubuntu-latest
        needs: build
        env:
            SSH_KEY: ${{ secrets.SSH_KEY }}
            NEON_SSH_USER: ${{ secrets.NEON_SSH_USER }}
            NEON_SSH_HOST: ${{ secrets.NEON_SSH_HOST }}
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: website
            - name: Setup SSH key
              run: |
                mkdir -p ~/.ssh
                echo "$SSH_KEY" > ~/.ssh/id_rsa
                chmod 600 ~/.ssh/id_rsa
                ssh-keyscan -H $NEON_SSH_HOST >> ~/.ssh/known_hosts
            - name: Deploy
              run: scp -r website/* $NEON_SSH_USER@$NEON_SSH_HOST:/var/www/www.taxborn.com