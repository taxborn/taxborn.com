# CI for taxborn.com - this just tests that everything compiles and
# tests pass.
#
# Forgejo Workflow reference: https://forgejo.org/docs/latest/user/actions/#workflow-reference-guide

on: [push]

jobs:
  build-and-test:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # only get the most recent commit
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/Jod'
      - run: npm i
      # - run: npm run test # waiting to write actual tests
      - run: npm run build
      - run: echo "dist file size: $(du -sh dist/)"
      - uses: actions/upload-artifact@v3 # v4 currently broken it seems 2025-04-19
        with:
          if-no-files-found: error # if nothing's found, error out to prevent bad docker image
          name: built-astro-site
          path: dist
  bundle:
    runs-on: docker
    needs: build-and-upload
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: built-astro-site

